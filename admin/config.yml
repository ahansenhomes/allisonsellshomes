backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/allisonsellshomes
  branch: main

media_folder: "images"
public_folder: "/images"

collections:

  # ─── SITE SETTINGS ───────────────────────────────────────────
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "_data/settings.json"
        fields:
          - { label: "Phone (display)", name: "phone", widget: "string", hint: "Shown on page, e.g. 618.604.6370" }
          - { label: "Phone (raw digits)", name: "phone_raw", widget: "string", hint: "Digits only for tel: links, e.g. 6186046370" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Address line 1", name: "address_line1", widget: "string" }
          - { label: "Address line 2", name: "address_line2", widget: "string" }
          - { label: "Years of experience", name: "years_experience", widget: "string" }
          - { label: "Total sales", name: "total_sales", widget: "string" }
          - { label: "Review count", name: "review_count", widget: "string", hint: "e.g. 135+" }
          - { label: "Hero headline", name: "hero_headline", widget: "string" }
          - { label: "Hero subheadline", name: "hero_subheadline", widget: "text" }
          - { label: "Footer description", name: "footer_description", widget: "text" }
          - { label: "License number", name: "license_number", widget: "string" }

  # ─── REVIEWS ─────────────────────────────────────────────────
  - name: "reviews"
    label: "Reviews"
    file: "_data/reviews.json"
    description: "Client reviews shown on the Reviews page and homepage"
    widget: "list"
    fields:
      - { label: "Stars (1–5)", name: "stars", widget: "number", value_type: "int", min: 1, max: 5, default: 5 }
      - { label: "Review text", name: "text", widget: "text" }
      - { label: "Reviewer name / label", name: "name", widget: "string", hint: "e.g. Home seller, First-time buyer" }
      - { label: "Location", name: "location", widget: "string", hint: "e.g. Glen Carbon, IL" }

  # ─── BLOG POSTS ──────────────────────────────────────────────
  - name: "blog"
    label: "Blog Posts"
    file: "_data/blog.json"
    description: "Blog post previews shown on the Blog page"
    widget: "list"
    fields:
      - { label: "Date", name: "date", widget: "string", hint: "e.g. December 2025" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Tag / category", name: "tag", widget: "string", hint: "e.g. Market update, Buyer tips, New listing" }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "Short preview shown on the blog card (2–3 sentences)" }

  # ─── BUYER FAQ ───────────────────────────────────────────────
  - name: "faq_buyers"
    label: "Buyer FAQ"
    file: "_data/faq_buyers.json"
    description: "FAQ questions shown on the Buyers page"
    widget: "list"
    fields:
      - { label: "Question", name: "question", widget: "string" }
      - { label: "Answer", name: "answer", widget: "text" }

  # ─── SELLER FAQ ──────────────────────────────────────────────
  - name: "faq_sellers"
    label: "Seller FAQ"
    file: "_data/faq_sellers.json"
    description: "FAQ questions shown on the Sellers page"
    widget: "list"
    fields:
      - { label: "Question", name: "question", widget: "string" }
      - { label: "Answer", name: "answer", widget: "text" }

  # ─── ESPAÑOL FAQ ─────────────────────────────────────────────
  - name: "faq_espanol"
    label: "FAQ en Español"
    file: "_data/faq_espanol.json"
    description: "FAQ questions shown on the En Español page"
    widget: "list"
    fields:
      - { label: "Pregunta", name: "question", widget: "string" }
      - { label: "Respuesta", name: "answer", widget: "text" }
